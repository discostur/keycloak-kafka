name: Release

# Builds the fat jar and publishes it to a GitHub Release when a version tag is pushed.
# Flow: bump <version> in pom.xml -> git tag vX.Y.Z -> git push origin vX.Y.Z

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/keycloak-kafka-*-jar-with-dependencies.jar
