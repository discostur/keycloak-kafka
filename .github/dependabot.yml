version: 2
updates:
  # Maven dependencies (Keycloak, Kafka, JUnit, Testcontainers, plugins)
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # GitHub Actions used in the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Base images in the Dockerfile (Keycloak, Maven builder)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
